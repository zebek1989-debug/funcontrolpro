name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore
        run: dotnet restore FanControlPro.sln

      - name: Build
        run: dotnet build FanControlPro.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test FanControlPro.sln --configuration Release --no-build --verbosity normal
